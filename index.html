<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--fg);-webkit-tap-highlight-color:transparent}

@keyframes marquee {0% { transform: translateX(0); } 100% { transform: translateX(-100%); }}
.animate-fade-in{animation:fade-in .3s ease}

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

/* ─── CONSTANTS ─── */
const FASES_DEFAULT=["REEMPLAZO","REPRODUCTIVA","PRECEBO","LEVANTE","ENGORDE","DESCANSO"];

const SUBFASES_REPRODUCTIVA=[
  /* --- GESTACIÓN --- */
  {key:"GEST_GESTANTE",label:"Gestación - Gestante",icon:"🤰"},
  {key:"GEST_SERVIDAS",label:"Gestación - Servidas",icon:"💉"},
  {key:"GEST_VACIA",label:"Gestación - Vacía",icon:"⭕"},
  {key:"GEST_DESCANSO",label:"Gestación - Descanso",icon:"😴"},
  {key:"GEST_DESCARTE",label:"Gestación - Descarte",icon:"🗑️"},
  /* --- MATERNIDAD --- */
  {key:"MAT_PROXIMA",label:"Maternidad - Próxima",icon:"⏳"},
  {key:"MAT_LACTANTES",label:"Maternidad - Lactantes",icon:"🍼"},
    /* --- REEMPLAZO --- */
  {key:"REEMP_VACIA",label:"Reemplazo - Vacía",icon:"⭕"},
  {key:"REEMP_SERVIDAS",label:"Reemplazo - Servidas",icon:"💉"},
  {key:"REEMP_GESTANTE",label:"Reemplazo - Gestante",icon:"🤰"},
  {key:"REEMP_DESCARTE",label:"Reemplazo - Descarte",icon:"🗑️"}
];

const VACUNA_SCHEDULE=[
  {key:"PRIMERA_TRIPLE",label:"1ra Dosis Vacuna Triple",icon:"💉",diasDesdeNacimiento:145},
  {key:"CML",label:"CML",icon:"🧪",diasDesdeVacunaAnterior:{vacuna:"PRIMERA_TRIPLE",dias:15}},
  {key:"SEGUNDA_TRIPLE",label:"2da Dosis Vacuna Triple",icon:"💉",diasDesdeVacunaAnterior:{vacuna:"CML",dias:8}},
  {key:"TERCERA_TRIPLE",label:"3ra Dosis Vacuna Triple",icon:"💉",diasDesdeNacimiento:210},
  {key:"INICIO_RECELO",label:"Inicio Recelo",icon:"🐽",diasDesdeNacimiento:170},
  {key:"DESPARASITACION",label:"Desparasitación",icon:"🛡️",diasDesdeNacimiento:225},
  {key:"ACTIVACION",label:"Fecha de Activación",icon:"⚡",diasDesdeNacimiento:240},
];
const VACUNA_ORDER=VACUNA_SCHEDULE.map(v=>v.key);
const ACCION_CONFIG={
  INGRESO:{icon:"🟢",label:"Ingreso"},SERVICIO:{icon:"💉",label:"Servicio"},
  PARTO:{icon:"🐷",label:"Parto"},DESTETE:{icon:"🥣",label:"Destete"},
  BAJA_LACTANCIA:{icon:"💀",label:"Baja Lechón"},TRASLADO:{icon:"🔵",label:"Traslado"},
  VENTA:{icon:"💰",label:"Venta"},MUERTE:{icon:"🔴",label:"Muerte"},
  OBSERVACION:{icon:"📝",label:"Observación"},ENFERMEDAD:{icon:"🏥",label:"Enfermedad"},
  CONFIRMAR_GESTACION:{icon:"🤰",label:"Confirmar Gestación"},
  RETORNO_VACIA:{icon:"⭕",label:"Retorno Vacía"},
  CAMBIAR_SUBFASE:{icon:"🔄",label:"Cambiar Subfase"},
  VACUNA:{icon:"💉",label:"Vacuna"},
  EMITIR_GUIA:{icon:"📄",label:"Emitir Guía"},
  QUITAR_GUIA:{icon:"❌",label:"Quitar Guía"},
  ATETE:{icon:"🍼",label:"Atete (Traslado Lechones)"},
};

const URL_SCRIPT="https://script.google.com/macros/s/AKfycbxE02CoqpyAY2g-DBHBQj4HLj62yBJUL36azqnQ_PJ3VRxjPdD2_BF1YGqr3Lwie6Ra/exec";

/* ─── OFFLINE & OPTIMISTIC SYNC SYSTEM ─── */
const CACHE_KEY = "granja_pro_cache";
const QUEUE_KEY = "granja_pro_queue";

function getQueue() { return JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]'); }
function setQueue(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); window.dispatchEvent(new Event('offline_queue_changed')); }

async function fetchFarmData(){
  try{
    if(!navigator.onLine) throw new Error("Offline");
    const r=await fetch(URL_SCRIPT+"?t="+Date.now(),{cache:"no-store"});
    const data=await r.json();
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    return data;
  }catch(e){
    const cached=localStorage.getItem(CACHE_KEY);
    if(cached) return JSON.parse(cached);
    return {registros:[], fases:[]};
  }
}

async function enviarRegistro(d){
  const q = getQueue(); 
  // --- NUEVO: Inyectar usuario actual ---
  d.usuario = localStorage.getItem("granja_pro_user") || "Desconocido";
  // --------------------------------------
  q.push({id:Date.now() + Math.random(), tipo:'registro', data:d}); 
  setQueue(q);
  window.dispatchEvent(new CustomEvent('optimistic_save', {detail: d}));
  syncQueue();
  return {ok:true};
}

async function enviarBatch(d){
  const q = getQueue(); 
  // --- NUEVO: Inyectar usuario actual al bloque común ---
  if(!d.comun) d.comun = {};
  d.comun.usuario = localStorage.getItem("granja_pro_user") || "Desconocido";
  // -----------------------------------------------------
  q.push({id:Date.now() + Math.random(), tipo:'batch', data:d}); 
  setQueue(q);
  window.dispatchEvent(new CustomEvent('optimistic_batch', {detail: d}));
  syncQueue();
  return {ok:true};
}

let isSyncing = false;
async function syncQueue() {
  if(!navigator.onLine || isSyncing) return false;
  
  isSyncing = true;
  window.dispatchEvent(new Event('sync_started'));
  
  let somethingSynced = false;
  
  while (true) {
    let currentQ = getQueue();
    if (currentQ.length === 0) break;
    
    let item = currentQ[0]; 
    try {
      const body = item.tipo === 'batch' ? JSON.stringify({tipo:"BATCH", ...item.data}) : JSON.stringify(item.data);
      const res = await fetch(URL_SCRIPT,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain;charset=utf-8"},body});
      if(!res.ok) throw new Error("Sync failed");
      
      let updatedQ = getQueue();
      updatedQ = updatedQ.filter(x => x.id !== item.id);
      setQueue(updatedQ);
      somethingSynced = true;
    } catch(e) {
      console.error("Fallo red. Pausando sincronización", e);
      break; 
    }
  }
  
  isSyncing = false;
  window.dispatchEvent(new Event('sync_ended'));
  
  if (somethingSynced && getQueue().length === 0) {
     window.dispatchEvent(new Event('sync_completed_all'));
  }
  return true;
}

/* ─── UTILS ─── */
function calcularDias(f){if(!f)return 0;return Math.floor((Date.now()-new Date(f).getTime())/864e5)}

function obtenerColorSubfase(dias,subfase){
  const rules={
    REEMP_VACIA:[10,5], REEMP_SERVIDAS:[30,25], REEMP_GESTANTE:[114,110],
    GEST_VACIA:[10,5], GEST_SERVIDAS:[30,25], GEST_GESTANTE:[114,110], GEST_DESCANSO:[7,5], GEST_DESCARTE:[999,999],
    MAT_PROXIMA:[5,3], MAT_LACTANTES:[28,21], MAT_DESTETADAS:[5,3]
  };
  const r=rules[subfase];
  if(r){if(dias>r[0])return"red";if(dias>r[1])return"yellow";}
  return"green";
}
function obtenerColor(dias,fase){
  if(fase.includes("PRECEBO")){if(dias>49)return"red";if(dias>42)return"yellow"}
  if(fase.includes("LEVANTE")){if(dias>60)return"red";if(dias>50)return"yellow"}
  if(fase.includes("ENGORDE")){if(dias>90)return"red";if(dias>75)return"yellow"}
  return"green";
}

function obtenerMensajeAlerta(animal){
  if(!animal.activo) return null;
  if(animal.color === "green") return null;

  const t = animal.color === "red" ? "URGENTE" : "ATENCIÓN";
  const alertas = [];
  const d = animal.dias;

  if (animal.colorFase === "red" || animal.colorFase === "yellow") {
    if(animal.fase==="REPRODUCTIVA"){
      const sfInfo = SUBFASES_REPRODUCTIVA.find(s=>s.key===animal.subfase);
      alertas.push(`${sfInfo ? sfInfo.label : animal.subfase} (${d}d)`);
    }else{
      if(animal.fase.includes("PRECEBO")) alertas.push(`Cumplió Precebo`);
      if(animal.fase.includes("LEVANTE")) alertas.push(`Cumplió Levante`);
      if(animal.fase.includes("ENGORDE")) alertas.push(`Lista para Venta`);
    }
  }

  if (animal.msgVacuna) alertas.push(animal.msgVacuna);

  if (alertas.length === 0) return null;
  return `${t}: ` + alertas.join(" | ");
}

function calcularSubfase(id,regs){
  const records=regs.filter(r=>r[1]?.toString()===id);
  let lServ=-1,lParto=-1,lDest=-1,lConf=-1,lRet=-1,lCamb=-1,cambSf=null,tPartos=0,tServ=0,subfaseIngreso=null;
  records.forEach((r,i)=>{
    const acc=r[2];
    if(acc==="INGRESO"){const m=(r[5]||"").match(/Subfase:\s*(\w+)/);if(m)subfaseIngreso=m[1]}
    if(acc==="SERVICIO"){lServ=i;tServ++}
    if(acc==="PARTO"){lParto=i;tPartos++}
    if(acc==="DESTETE")lDest=i;
    if(acc==="CONFIRMAR_GESTACION")lConf=i;
    if(acc==="RETORNO_VACIA")lRet=i;
    if(acc==="CAMBIAR_SUBFASE"){lCamb=i;const m=(r[5]||"").match(/Subfase:\s*(\w+)/);if(m)cambSf=m[1]}
  });
  const maxIdx=Math.max(lServ,lParto,lDest,lConf,lRet,lCamb);
  
  if(lCamb===maxIdx&&cambSf)return{subfase:cambSf,fechaSubfase:records[lCamb]?.[0]?.toString()||""};
  
  const lastRec=maxIdx>=0?records[maxIdx]:records[records.length-1];
  const fecha=lastRec?lastRec[0]?.toString()||"":"";

  const isReemplazo = (tPartos === 0);

  if(lDest>lParto&&lDest>lServ){
    const fSub = records[lDest]?.[0]?.toString()||fecha;
    if(calcularDias(fSub) >= 7) return {subfase: isReemplazo ? "REEMP_VACIA" : "GEST_VACIA", fechaSubfase: fSub};
    return {subfase: "MAT_DESTETADAS", fechaSubfase: fSub};
  }
  if(lRet>lServ&&lRet>lParto)return{subfase:isReemplazo?"REEMP_VACIA":"GEST_VACIA",fechaSubfase:records[lRet]?.[0]?.toString()||fecha};
  if(lConf>lServ&&lConf>lParto)return{subfase:isReemplazo?"REEMP_GESTANTE":"GEST_GESTANTE",fechaSubfase:records[lConf]?.[0]?.toString()||fecha};
  if(lServ>lParto&&lServ>lDest)return{subfase:isReemplazo?"REEMP_SERVIDAS":"GEST_SERVIDAS",fechaSubfase:records[lServ]?.[0]?.toString()||fecha};
  if(lParto>lServ)return{subfase:"MAT_LACTANTES",fechaSubfase:records[lParto]?.[0]?.toString()||fecha};
  
  if(tPartos===0&&tServ===0)return{subfase:subfaseIngreso||"REEMP_VACIA",fechaSubfase:fecha};
  return{subfase:"GEST_VACIA",fechaSubfase:fecha};
}

function procesarInventario(regs){
  if(!regs||!regs.length) return {activos:[], todos:[]};
  const estados={};
  regs.forEach(r=>{
    const id=r[1]?.toString();const acc=r[2];const fase=r[3];const fecha=r[0];if(!id)return;
    if(!estados[id])estados[id]={id,piglets:0,subpuesto:r[12]?.toString()||"",fase:fase||"",chapeta:r[10]?.toString()||"",madre:r[7]?.toString()||"",sexo:r[14]?.toString()||"",fechaNacimiento:r[15]?.toString()||"",tieneGuia:false,activo:true,fechaFase:fecha};
    
    if(r[14] && r[14].toString().trim() !== "") estados[id].sexo = r[14].toString().trim();
    if(r[15] && r[15].toString().trim() !== "") estados[id].fechaNacimiento = r[15].toString().trim();

    estados[id].ultimaAccion=acc;
    if(acc==="VENTA"||acc==="MUERTE"){estados[id].activo=false;estados[id].fechaFase=fecha}
    else{
      estados[id].activo=true;
      const nf=(fase||"").toUpperCase().trim().replace(/ /g,"_");
      if(estados[id].fase!==nf){estados[id].fase=nf;estados[id].fechaFase=fecha}
      estados[id].subpuesto=r[12]?.toString()||"";
      estados[id].chapeta=r[10]?.toString()||"";
      if(acc==="PARTO"){const m=(r[5]||"").match(/Vivos: (\d+)/);if(m)estados[id].piglets=parseInt(m[1]);estados[id].fechaFase=fecha}
      if(acc==="BAJA_LACTANCIA"){const m=(r[5]||"").match(/Cantidad: (\d+)/);if(m)estados[id].piglets=Math.max(0,estados[id].piglets-parseInt(m[1]))}
      if(acc==="DESTETE"){estados[id].piglets=0;estados[id].fechaFase=fecha}
      if(acc==="ATETE"){
        const mSal=r[5]?.match(/Salida de (\d+)/); if(mSal) estados[id].piglets=Math.max(0,(estados[id].piglets||0)-parseInt(mSal[1]));
        const mEnt=r[5]?.match(/Entrada de (\d+)/); if(mEnt) estados[id].piglets=(estados[id].piglets||0)+parseInt(mEnt[1]);
      }
      if(acc==="EMITIR_GUIA"){estados[id].tieneGuia=true}
      if(acc==="QUITAR_GUIA"){estados[id].tieneGuia=false}
    }
  });

  const todos=Object.values(estados).map(e=>{
    // --- NUEVO: Pasar automáticamente de DESCANSO a REPRODUCTIVA a los 7 días ---
    if(e.activo && e.fase === "DESCANSO" && calcularDias(e.fechaFase) >= 7) {
        e.fase = "REPRODUCTIVA";
    }
    // ----------------------------------------------------------------------------

    // 1. Evaluar color por Fases/Subfases
    if(e.activo&&e.fase==="REPRODUCTIVA"){
      const{subfase,fechaSubfase}=calcularSubfase(e.id,regs);
      if(e.piglets>0){
        e.subfase="MAT_LACTANTES";
        const partoRecs=regs.filter(r=>r[1]?.toString()===e.id&&r[2]==="PARTO");
        const lastP=partoRecs[partoRecs.length-1];
        e.fechaFase=lastP?lastP[0]?.toString()||fechaSubfase:fechaSubfase;
      }else{e.subfase=subfase;e.fechaFase=fechaSubfase}
      e.dias=calcularDias(e.fechaFase);
      e.colorFase=obtenerColorSubfase(e.dias,e.subfase);
    }else{
      e.dias=calcularDias(e.fechaFase);
      e.colorFase=e.activo?obtenerColor(e.dias,e.fase):"red";
    }

    // 2. Evaluar color por Vacunas (Nuevo)
    e.colorVacuna = "green";
    e.msgVacuna = null;
    if(e.activo) {
       const vacunasAplicadas = getVacunaRecords(e.id, regs);
       let fechaBase = e.fechaNacimiento ? extractDateKey(e.fechaNacimiento) : null;
       if(!fechaBase) {
         const ingreso = regs.find(r=>r[1]?.toString()===e.id && r[2]==="INGRESO");
         if(ingreso) fechaBase = extractDateKey(ingreso[0]);
       }
       
       if(fechaBase) {
         const hoy = new Date(); hoy.setHours(0,0,0,0);
         const activeSchedule = getFilteredVacunas(e);
         for(let v of activeSchedule) {
           if(vacunasAplicadas[v.key]) continue; // Ya se aplicó
           
           let fechaProg=null;
           if(v.diasDesdeNacimiento){
             fechaProg=new Date(fechaBase+"T12:00:00");
             fechaProg.setDate(fechaProg.getDate()+v.diasDesdeNacimiento);
           } else if(v.diasDesdeVacunaAnterior) {
             const prev=vacunasAplicadas[v.diasDesdeVacunaAnterior.vacuna];
             if(prev){
               fechaProg=new Date(prev+"T12:00:00");
               fechaProg.setDate(fechaProg.getDate()+v.diasDesdeVacunaAnterior.dias);
             }
           }
           
           if(fechaProg){
             const dRest=Math.ceil((fechaProg.getTime()-hoy.getTime())/86400000);
             if(dRest < 0){
               e.colorVacuna = "red";
               e.msgVacuna = `💉 ${v.label} vencida hace ${Math.abs(dRest)}d`;
               break; // Caso peor, salimos del loop
             } else if (dRest <= 5) {
               if(e.colorVacuna !== "red"){
                 e.colorVacuna = "yellow";
                 e.msgVacuna = `💉 ${v.label} faltan ${dRest}d`;
               }
             }
           }
         }
       }
    }

    // 3. Unificar ambos colores (El rojo domina, luego el amarillo, por último el verde)
    const rank = { red: 3, yellow: 2, green: 1 };
    if (!e.activo) {
      e.color = "red";
    } else {
      e.color = rank[e.colorFase] > rank[e.colorVacuna] ? e.colorFase : e.colorVacuna;
    }

    return e;
  });
  return{activos:todos.filter(e=>e.activo),todos};
}

function buildDashboardData(inv){
  const data={total:0,piglets:0,phases:{}};
  inv.forEach(e=>{data.total++;data.piglets+=(e.piglets||0);if(!data.phases[e.fase])data.phases[e.fase]={count:0,alert:null,subpuestos:{}};data.phases[e.fase].count++;const sub=e.subpuesto||"Sin puesto";data.phases[e.fase].subpuestos[sub]=(data.phases[e.fase].subpuestos[sub]||0)+1;if(e.color==="red")data.phases[e.fase].alert="red";else if(e.color==="yellow"&&data.phases[e.fase].alert!=="red")data.phases[e.fase].alert="yellow"});
  return data;
}

const colorMap={green:"var(--success)",yellow:"var(--warning)",red:"var(--destructive)"};

function formatDateStr(date){
  const y=date.getFullYear(),m=String(date.getMonth()+1).padStart(2,"0"),d=String(date.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+d;
}
function extractDateKey(raw){
  if(!raw)return"";
  const str=String(raw);
  const match=str.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(match)return match[1]+"-"+match[2]+"-"+match[3];
  const parsed=new Date(str);
  if(!isNaN(parsed.getTime()))return formatDateStr(parsed);
  return"";
}
function dateKeyToLabel(key){if(!key)return"";const[y,m,d]=key.split("-");return d+"/"+m+"/"+y}
function toAppsScriptDate(key){return key?key+"T12:00:00":""}

function parseVacunaTypeFromNotas(notasRaw){
  const notas=String(notasRaw||"");
  const m=notas.match(/Tipo:\s*([A-Z_]+)/i);
  const raw=m?.[1]?.toUpperCase().trim();
  if(!raw)return null;
  return VACUNA_ORDER.includes(raw)?raw:null;
}

function getVacunaRecords(animalId,historial){
  const result={};
  const registrosVacuna=historial
    .filter(r=>r[1]?.toString()===animalId&&r[2]==="VACUNA")
    .sort((a,b)=>new Date(String(a[0])).getTime()-new Date(String(b[0])).getTime());
  registrosVacuna.forEach(r=>{
    const fecha=extractDateKey(r[0]);
    if(!fecha)return;
    const tipoExplicito=parseVacunaTypeFromNotas(r[5]);
    if(tipoExplicito){result[tipoExplicito]=fecha;return}
    const siguiente=VACUNA_ORDER.find(key=>!result[key]);
    if(siguiente)result[siguiente]=fecha;
  });
  return result;
}

function calcFechaProgramada(vacunaItem,fechaNacimiento,vacunasAplicadas){
  if(vacunaItem.diasDesdeNacimiento&&fechaNacimiento){
    const d=new Date(fechaNacimiento);d.setDate(d.getDate()+vacunaItem.diasDesdeNacimiento);
    return formatDateStr(d);
  }
  if(vacunaItem.diasDesdeVacunaAnterior){
    const prev=vacunasAplicadas[vacunaItem.diasDesdeVacunaAnterior.vacuna];
    if(prev){const d=new Date(prev);d.setDate(d.getDate()+vacunaItem.diasDesdeVacunaAnterior.dias);return formatDateStr(d)}
  }
  return"";
}

function getFilteredVacunas(animal) {

function RegistroForm({inventario,fasesExtra,prefillId,prefillAccion,prefillAnimal,historial,onSuccess}){
  const allFases=[...new Set([...FASES_DEFAULT,...fasesExtra])];
  const[accion,setAccion]=useState(prefillAccion||"INGRESO");
  const[tatuaje,setTatuaje]=useState(prefillId||"");
  const[chapeta,setChapeta]=useState(prefillAnimal?.chapeta||"");
  const[peso,setPeso]=useState("");
  const[sexo,setSexo]=useState(prefillAnimal?.sexo||"H"); 
  const[fase,setFase]=useState(prefillAnimal?.fase||allFases[0]);
  const[subpuesto,setSubpuesto]=useState(prefillAnimal?.subpuesto||"");
  const[notas,setNotas]=useState("");
  const[comprador,setComprador]=useState("");
  const[inseminador,setInseminador]=useState("");
  const[dosis,setDosis]=useState("");
  const[padre,setPadre]=useState("");
  const[vivos,setVivos]=useState("");
  const[murieronNacer,setMurieronNacer]=useState("");
  const[nacidosMuertos,setNacidosMuertos]=useState("");
  const[momias,setMomias]=useState("");
  const[partoPrevioInfo,setPartoPrevioInfo]=useState(null);
  const[cantAtete,setCantAtete]=useState("");
  const[madreReceptora,setMadreReceptora]=useState("");

  // 1.5 AUTO-COMPLETAR INFO DEL ÚLTIMO PARTO EN EL DESTETE
  useEffect(() => {
    if (accion === "DESTETE" && tatuaje) {
      const records = (historial||[]).filter(r => r[1]?.toString() === tatuaje && r[2] === "PARTO");
      if (records.length > 0) {
        const lastParto = records[records.length - 1];
        const notas = lastParto[5] || "";
        const mH = notas.match(/Hembras:\s*(\d+)/);
        const mM = notas.match(/Machos:\s*(\d+)/);
        const mVivos = notas.match(/Vivos:\s*(\d+)/);
        
        setPartoPrevioInfo({
          hembras: mH ? parseInt(mH[1]) : 0,
          machos: mM ? parseInt(mM[1]) : 0,
          vivos: mVivos ? parseInt(mVivos[1]) : 0
        });
      } else {
        setPartoPrevioInfo(null);
      }
    } else {
      setPartoPrevioInfo(null);
    }
  }, [accion, tatuaje, historial]);

  // 1. AUTO-COMPLETAR PADRE
  useEffect(() => {
    if(accion === "PARTO" && tatuaje){
      const records = (historial||[]).filter(r => r[1]?.toString() === tatuaje);
      const lastServ = records.slice().reverse().find(r => r[2] === "SERVICIO" || r[2] === "CONFIRMAR_GESTACION");
      if(lastServ){
        const match = (lastServ[5]||"").match(/(?:Dosis|Padre\/Dosis):\s*([^|]+)/);
        if(match) setPadre(match[1].trim());
      }
    }
  }, [accion, tatuaje, historial]);

  // 2. CALCULAR LISTA DE PESOS (Vivos + Murieron al nacer + Nacidos Muertos)
  const updateTotalLechones = (vVal, mnVal, nmVal) => {
      const v = parseInt(vVal) || 0;
      const mn = parseInt(mnVal) || 0;
      const nm = parseInt(nmVal) || 0;
      const total = v + mn + nm;
      
      setPartoLechones(prev => {
          return Array.from({length: total}, (_, i) => {
              let cat = "VIVO";
              if (i >= v && i < v + mn) cat = "M. NACER";
              else if (i >= v + mn) cat = "N. MUERTO";
              
              if (prev[i]) return {...prev[i], estado: cat};
              return {peso: "", sexo: "H", estado: cat};
          });
      });
  };
  const[cantBaja,setCantBaja]=useState("1");
  const[causaBaja,setCausaBaja]=useState("");
  const[destetados,setDestetados]=useState("");
  const[destLechones,setDestLechones]=useState("PRECEBO");
  const[lechones,setLechones]=useState([]);
  const[partoLechones,setPartoLechones]=useState([]);
  const[semanaNac,setSemanaNac]=useState("");
  const[saving,setSaving]=useState(false);
  const[fechaEvento,setFechaEvento]=useState(prefillAccion==="INGRESO"?undefined:new Date());

function LoginView({ onLogin }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const handleLogin = async (e) => {
    e.preventDefault();
    if(!user || !pass) { setError("Completa los datos"); return; }
    setLoading(true); setError("");
    try {
      if(!navigator.onLine) throw new Error("Necesitas internet para iniciar sesión la primera vez.");
      const res = await fetch(URL_SCRIPT, {
        method: "POST", 
        body: JSON.stringify({tipo: "LOGIN", usuario: user.trim(), clave: pass.trim()}),
        headers: { "Content-Type": "text/plain;charset=utf-8" }
      });
      const data = await res.json();
      if(data.ok) {
        localStorage.setItem("granja_pro_user", data.usuario);
        onLogin(data.usuario);
      } else {
        setError(data.error || "Datos incorrectos");
      }
    } catch(err) {
      setError(err.message || "Error al conectar con el servidor.");
    }
    setLoading(false);
  };

  return React.createElement("div", {style: {minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20}, className: "gradient-farm"},
    React.createElement("form", {onSubmit: handleLogin, className: "animate-fade-in", style: {background: "var(--card)", padding: 32, borderRadius: 16, width: "100%", maxWidth: 360, boxShadow: "0 10px 25px rgba(0,0,0,0.5)"}},
      React.createElement("div", {style: {textAlign: "center", marginBottom: 24}},
        React.createElement("span", {style: {fontSize: 48}}, "🐷"),
        React.createElement("h1", {style: {fontSize: 24, fontWeight: 800, color: "var(--card-fg)", marginTop: 8}}, "Granja Pro"),
        React.createElement("p", {style: {fontSize: 12, color: "var(--muted-fg)", marginTop: 4}}, "Acceso de Usuarios")
      ),
      error && React.createElement("div", {style: {padding: 12, background: "rgba(220,38,38,.1)", color: "var(--destructive)", borderRadius: 8, marginBottom: 16, fontSize: 13, textAlign: "center", fontWeight: 700}}, error),
      React.createElement("label", {style: {display:"block", fontSize:12, fontWeight:700, marginBottom:6, color:"var(--muted-fg)"}}, "Usuario"),
      React.createElement("input", {value: user, onChange: e=>setUser(e.target.value), placeholder: "Tu usuario", style: {width: "100%", padding: "12px", borderRadius: 8, border: "1px solid var(--input)", background: "var(--bg)", color: "var(--fg)", marginBottom: 16, fontSize: 14, outline: "none"}}),
      React.createElement("label", {style: {display:"block", fontSize:12, fontWeight:700, marginBottom:6, color:"var(--muted-fg)"}}, "Contraseña"),
      React.createElement("input", {type: "password", value: pass, onChange: e=>setPass(e.target.value), placeholder: "••••••••", style: {width: "100%", padding: "12px", borderRadius: 8, border: "1px solid var(--input)", background: "var(--bg)", color: "var(--fg)", marginBottom: 24, fontSize: 14, outline: "none"}}),
      React.createElement("button", {type: "submit", disabled: loading, style: {width: "100%", padding: "14px 0", borderRadius: 8, background: "var(--primary)", color: "#fff", fontWeight: 700, fontSize: 16, border: "none", cursor: "pointer", opacity: loading?0.7:1}}, loading ? "Verificando..." : "Ingresar")
    )
  );

function App(){

    if(!window.confirm("¿Seguro que deseas cerrar sesión? Necesitarás internet para volver a entrar.")) return;
    localStorage.removeItem("granja_pro_user");
    setCurrentUser(null);
  };

  const[tab,setTab]=useState("dashboard");
  const[dashView,setDashView]=useState("summary");
  const[inventario,setInventario]=useState([]);
  const[todosAnimales,setTodosAnimales]=useState([]);
  const[historial,setHistorial]=useState([]);
  const[fasesExtra,setFasesExtra]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState("");
  const[currentPhase,setCurrentPhase]=useState("");
  const[listTitle,setListTitle]=useState("");
  const[listAnimals,setListAnimals]=useState([]);
  const[selectedAnimal,setSelectedAnimal]=useState(null);
  const[prefillId,setPrefillId]=useState("");
  const[prefillAccion,setPrefillAccion]=useState("INGRESO");
  const[prefillAnimal,setPrefillAnimal]=useState(null);
  const[filterPuesto,setFilterPuesto]=useState("");
  const[filterMadre,setFilterMadre]=useState("");
  const[filterGuia,setFilterGuia]=useState("");

  const[isOnline,setIsOnline]=useState(navigator.onLine);
  const[queueCount,setQueueCount]=useState(getQueue().length);
  const[syncing,setSyncing]=useState(false);
  const[deferredPrompt,setDeferredPrompt]=useState(null);

  const loadData=useCallback(async(background=false)=>{
    const cachedStr = localStorage.getItem(CACHE_KEY);
    let hasCache = false;
    if(cachedStr){
      try{
        const data = JSON.parse(cachedStr);
        setHistorial(data.registros || []);
        const result = procesarInventario(data.registros || []);
        setInventario(result.activos);
        setTodosAnimales(result.todos);
        setFasesExtra(data.fases || []);
        hasCache = true;
      }catch(e){}
    }

    if(!background && !hasCache) setLoading(true);
    else setLoading(false);

    if(navigator.onLine){
      if(hasCache && !background) setSyncing(true);
      try{
        const r = await fetch(URL_SCRIPT+"?t="+Date.now(),{cache:"no-store"});
        if(!r.ok) throw new Error("Network error");
        const data = await r.json();
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        
        setHistorial(data.registros);
        const result = procesarInventario(data.registros);
        setInventario(result.activos);
        setTodosAnimales(result.todos);
        setFasesExtra(data.fases || []);
      }catch(e){
        console.error("Fallo fetch de fondo", e);
      }
      setSyncing(false);
      setLoading(false);
    }
  },[]);

  useEffect(()=>{
    loadData();

    const handleOnline=()=>{ setIsOnline(true); syncQueue(); };
    const handleOffline=()=>setIsOnline(false);
    const handleQueueChange=()=>setQueueCount(getQueue().length);
    const handleSyncStart=()=>setSyncing(true);
    const handleSyncEnd=()=>setSyncing(false);
    const handleSyncAllDone=()=>{ /* Ya no forzamos recarga de Google Sheets para no borrar la caché de trabajo rápido */ };

    const handleOptimisticSave=(e)=>{
      const d = e.detail;
      setHistorial(prev=>{
        const next = [...prev, [
          d.fecha || new Date().toISOString(), // 0 (A)
          d.tatuaje || "",                     // 1 (B)
          d.accion || "",                      // 2 (C)
          d.fase || "",                        // 3 (D)
          "",                                  // 4 (E)
          d.notas || "",                       // 5 (F)
          "",                                  // 6 (G)
          d.madre || "",                       // 7 (H)
          "",                                  // 8 (I)
          "",                                  // 9 (J)
          d.chapeta || "",                     // 10 (K)
          d.peso || "",                        // 11 (L)
          d.subpuesto || "",                   // 12 (M)
          d.inseminador || "",                 // 13 (N)
          d.sexo || "",                        // 14 (O)
          d.fechaNacimiento || "",             // 15 (P)
          d.usuario || ""                      // 16 (Q) <--- NUEVO USUARIO
        ]];
        /* 👇 INICIO NUEVO: GUARDAR EN CACHÉ LOCAL INMEDIATAMENTE 👇 */
        try {
          const cacheStr = localStorage.getItem(CACHE_KEY);
          if (cacheStr) {
             const cache = JSON.parse(cacheStr);
             cache.registros = next;
             localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
          }
        } catch(err) {}
        /* 👆 FIN NUEVO 👆 */
        const result = procesarInventario(next);
        setInventario(result.activos);
        setTodosAnimales(result.todos);
        return next;
      });
    };

    const handleOptimisticBatch=(e)=>{
      const {comun, animales} = e.detail;
      setHistorial(prev=>{
        const next = [...prev];
        animales.forEach(a=>{
           next.push([
             comun.fecha || new Date().toISOString(),

             comun.accion || "",
             comun.fase || "",

    };

    if (!deferredPrompt) return;

      setDeferredPrompt(null);

  const{subpuestos,madres}=useMemo(()=>{const s=new Set(),m=new Set();inventario.forEach(a=>{if(a.subpuesto)s.add(a.subpuesto);if(a.madre)m.add(a.madre)});return{subpuestos:[...s].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true})),madres:[...m].sort()}},[inventario]);

    if(filterPuesto&&a.subpuesto!==filterPuesto)return false;

  const getMadurez=useCallback(id=>{const partos=historial.filter(h=>h[1]?.toString()===id&&h[2]==="PARTO").length;if(partos===0)return"NULIPARAS";if(partos===1)return"PRIMIPARAS";if(partos===2)return"MULTIPARAS";return"MULTIPARAS +"+partos},[historial]);

             (a.chapeta&&a.chapeta.toString().toUpperCase().includes(upper))||
             madurez.toUpperCase().includes(upper)||
             matchingIds.has(a.id.toString());
    });
    
    setListTitle("Resultados de búsqueda");
    setListAnimals(filtered);
    if(tab==="dashboard") setDashView("list");
  };

  const handleTabChange=newTab=>{setTab(newTab);if(newTab==="dashboard")setDashView("summary");if(newTab==="registro"){setPrefillId("");setPrefillAccion("INGRESO");setPrefillAnimal(null)}};

              React.createElement("div",null,React.createElement("label",{style:{fontSize:9,fontWeight:700,color:"var(--muted-fg)",textTransform:"uppercase",letterSpacing:1}},"📍 Puesto"),React.createElement("select",{value:filterPuesto,onChange:e=>setFilterPuesto(e.target.value),style:inputS},React.createElement("option",{value:""},"Todos"),subpuestos.map(s=>React.createElement("option",{key:s,value:s},s)))),

      }
    }, "📲 Instalar App")
    /* 👆 FIN DEL BOTÓN FLOTANTE 👆 */
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        // Escucha si hay una nueva versión disponible en el servidor
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            // Si la nueva versión se instaló y ya había una app controlando antes...
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              console.log("Nueva versión detectada. Recargando app...");
              // Recarga la página automáticamente para aplicar los cambios
              window.location.reload();
            }
          });
        });
      });
    });
  }
</script>
